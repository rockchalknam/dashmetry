<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Dashmetry Project | Student Portal</title>
    <style>
      body { margin: 0; background-color: #0e0e10; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
      #unity-container { position: relative; width: 960px; height: 600px; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
      canvas { width: 100%; height: 100%; display: block; }
      #loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0e0e10; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
      #progress-bar-empty { width: 250px; height: 10px; background: #333; border-radius: 5px; margin-top: 20px; }
      #progress-bar-full { width: 0%; height: 100%; background: #00ffcc; border-radius: 5px; transition: width 0.2s; }
    </style>
  </head>
  <body>

    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="loading-overlay">
        <div style="letter-spacing: 2px;">LOADING DASHMETRY...</div>
        <div id="progress-bar-empty"><div id="progress-bar-full"></div></div>
      </div>
    </div>

    <script>
      const canvas = document.querySelector("#unity-canvas");
      const loadingOverlay = document.querySelector("#loading-overlay");
      const progressBarFull = document.querySelector("#progress-bar-full");

      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/Dashmetry.loader.js";
      const config = {
        dataUrl: buildUrl + "/Dashmetry.data.br",
        frameworkUrl: buildUrl + "/Dashmetry.framework.js.br",
        codeUrl: buildUrl + "/Dashmetry.wasm.br",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "1Games",
        productName: "Dashmetry",
        productVersion: "1.0",
      };

      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingOverlay.style.display = "none";
          canvas.focus();
        }).catch((message) => {
          alert("Error: " + message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
