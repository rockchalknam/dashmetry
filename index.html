<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Dashmetry</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        #game-area {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: 0;
            display: block;
        }
        #fullscreen-btn {
            position: fixed;
            bottom: 12px;
            right: 12px;
            z-index: 9999;
            padding: 8px 14px;
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 6px;
            font-family: system-ui, sans-serif;
            font-size: 14px;
            cursor: pointer;
        }
        #fullscreen-btn:hover {
            background: rgba(0, 0, 0, 0.85);
        }
    </style>
</head>
<body>
    <iframe
        id="game-area"
        src="https://dashmetry.com/embed/homepage"
        allow="autoplay; fullscreen; gamepad; keyboard-map *; clipboard-write; accelerometer; gyroscope"
        allowfullscreen></iframe>

    <button id="fullscreen-btn" onclick="goFullscreen()">⛶ Fullscreen</button>

    <script>
        function goFullscreen() {
            const el = document.getElementById('game-area');
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.msRequestFullscreen) el.msRequestFullscreen();
        }
    </script>
</body>
</html>
